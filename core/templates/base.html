{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ site_settings.site_title }}{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;500;600;700&family=Caveat:wght@600;700&display=swap" rel="stylesheet">  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.35.0/tabler-icons.min.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.1/aos.css" rel="stylesheet">

  <link rel="stylesheet" href="{% static 'css/variables.css' %}">
  <link rel="stylesheet" href="{% static 'css/base.css' %}">
  <link rel="stylesheet" href="{% static 'css/header.css' %}">
  <link rel="stylesheet" href="{% static 'css/footer.css' %}">
  <link rel="stylesheet" href="{% static 'css/banner.css' %}">
  <link rel="stylesheet" href="{% static 'css/home.css' %}">
  <link rel="stylesheet" href="{% static 'css/about.css' %}">
  <link rel="stylesheet" href="{% static 'css/services.css' %}">
  <link rel="stylesheet" href="{% static 'css/service_detail.css' %}">
  <link rel="stylesheet" href="{% static 'css/products.css' %}">
  <link rel="stylesheet" href="{% static 'css/product_detail.css' %}">
  <link rel="stylesheet" href="{% static 'css/solutions.css' %}">
  <link rel="stylesheet" href="{% static 'css/process.css' %}">
  <link rel="stylesheet" href="{% static 'css/build_cta.css' %}">
  <link rel="stylesheet" href="{% static 'css/contact.css' %}">
  <link rel="stylesheet" href="{% static 'css/careers.css' %}">
  <link rel="stylesheet" href="{% static 'css/animations.css' %}">
  {% block extra_css %}{% endblock %}
</head>
<body>

  {% include "includes/header.html" %}

  <main>
    {% block content %}{% endblock %}
  </main>
  {% include "includes/build_cta.html" %}
  {% include "includes/footer.html" %}

  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.1/aos.js"></script>
  <script>
    AOS.init({ duration: 700, once: true, offset: 80 });
  </script>
  <script src="{% static 'js/header.js' %}"></script>
  <script src="{% static 'js/counter.js' %}"></script>
  <script src="{% static 'js/process-sequence.js' %}"></script>
  <script src="{% static 'js/process-rocket.js' %}"></script>
  <script src="{% static 'js/contact-form.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
